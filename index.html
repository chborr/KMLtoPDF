<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KML → PDF Konverter</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161a22;
    --surface2: #1e2330;
    --border: #2a3044;
    --accent: #3de68c;
    --accent2: #5b8fff;
    --text: #e8ecf4;
    --muted: #7a8499;
    --danger: #ff5f6d;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 1000;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--accent); }

  .header-badge {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* ── LAYOUT ── */
  .app {
    display: flex;
    justify-content: center;
    padding: 32px 24px;
    flex: 1;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 480px;
    height: fit-content;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Drop Zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: var(--surface2);
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(61,230,140,0.05);
  }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%;
  }
  .drop-icon {
    font-size: 32px; margin-bottom: 10px;
    display: block;
  }
  .drop-title {
    font-weight: 600; font-size: 14px;
    margin-bottom: 6px;
  }
  .drop-sub {
    font-size: 12px; color: var(--muted);
  }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }
  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-size: 11px; color: var(--muted); margin-top: 2px;
  }

  /* Feature list */
  .feature-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .feature-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .feature-item:hover { border-color: var(--accent2); }
  .feature-item.active { border-color: var(--accent); background: rgba(61,230,140,0.06); }
  .feature-item .fi-left { display: flex; align-items: center; gap: 10px; }
  .feature-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border);
  }
  .feature-item.active .feature-dot { background: var(--accent); }

  /* PDF Config */
  .config-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 10px;
  }
  .config-label { color: var(--muted); }
  select, input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 5px 9px;
    outline: none;
  }
  select:focus, input:focus { border-color: var(--accent2); }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: var(--radius);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #28c070);
    color: #0d0f14;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(61,230,140,0.3); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent2); }

  /* ── MAP AREA ── */
  .map-area {
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .map-toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .toolbar-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .toolbar-btn:hover { border-color: var(--accent2); }
  .toolbar-btn.active { border-color: var(--accent); color: var(--accent); }

  #map {
    flex: 1;
    background: #1a1f2e;
    min-height: 400px;
    height: calc(100vh - 65px - 49px); /* viewport minus header and toolbar */
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--muted);
    padding: 40px;
  }
  .empty-icon { font-size: 64px; opacity: 0.3; }
  .empty-title { font-size: 18px; font-weight: 500; color: var(--text); }
  .empty-sub { font-size: 13px; text-align: center; max-width: 300px; line-height: 1.6; }

  /* Feature popup in map */
  .feature-info-panel {
    position: absolute;
    bottom: 20px; right: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    max-width: 280px;
    z-index: 500;
    display: none;
    font-size: 13px;
  }
  .feature-info-panel.visible { display: block; }
  .fip-title { font-weight: 600; margin-bottom: 8px; font-size: 14px; }
  .fip-prop { display: flex; gap: 8px; margin-top: 4px; }
  .fip-key { color: var(--muted); min-width: 80px; }
  .fip-val { word-break: break-all; }
  .fip-close { float: right; cursor: pointer; color: var(--muted); font-size: 16px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 30px; padding: 10px 24px;
    font-size: 13px; z-index: 9999;
    display: none; align-items: center; gap: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: fadeUp 0.3s ease;
  }
  .toast.show { display: flex; }
  .toast.success { border-color: var(--accent); }
  .toast.error { border-color: var(--danger); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* Legend */
  .legend {
    display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
    margin-left: auto;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* PDF Preview overlay */
  #pdf-preview {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 8000;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #pdf-preview.show { display: flex; }
  .preview-card {
    background: #fff;
    width: 794px;
    max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
    border-radius: 4px;
    position: relative;
  }
  .preview-actions {
    display: flex; gap: 12px;
  }
  .preview-btn {
    padding: 10px 24px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    border: none;
    font-weight: 700;
  }
  .preview-btn.confirm {
    background: var(--accent); color: #0d0f14;
  }
  .preview-btn.cancel {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Leaflet dark tiles override */
  .leaflet-tile { filter: brightness(0.85) contrast(1.05) saturate(0.9); }
  .leaflet-popup-content-wrapper {
    background: var(--surface2) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: var(--radius) !important;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5) !important;
  }
  .leaflet-popup-tip { background: var(--surface2) !important; }
  .leaflet-popup-content { color: var(--text) !important; font-family: 'DM Sans', sans-serif; font-size: 13px; }
  .leaflet-control-zoom a {
    background: var(--surface2) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--surface) !important; }

  /* Numbered pin markers on live map */
  .kml-pin {
    width: 22px;
    height: 22px;
    background: #2962ff;
    border: 2.5px solid #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 700;
    box-shadow: 0 2px 6px rgba(0,0,0,0.35);
    cursor: pointer;
  }
  .kml-pin:hover {
    background: #1a44cc;
    transform: scale(1.15);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🗺️</div>
    <div class="logo-text">KML<span>→</span>PDF</div>
  </div>
  <div class="header-badge">v1.0 · Geo-Konverter</div>
</header>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- Upload -->
    <div>
      <div class="section-label">01 · Datei laden</div>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".kml,.kmz">
        <span class="drop-icon">📂</span>
        <div class="drop-title">KML-Datei hier ablegen</div>
        <div class="drop-sub">oder klicken zum Auswählen<br>.kml · .kmz</div>
      </div>
    </div>

    <!-- Stats -->
    <div>
      <div class="section-label">02 · Statistiken</div>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="statFeatures">—</div>
          <div class="stat-label">Features</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statLayers">—</div>
          <div class="stat-label">Ebenen</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statPoints">—</div>
          <div class="stat-label">Punkte</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statPolygons">—</div>
          <div class="stat-label">Polygone</div>
        </div>
      </div>
    </div>

    <!-- Layer Toggle -->
    <div id="layerSection" style="display:none">
      <div class="section-label">03 · Ebenen</div>
      <div class="feature-list" id="featureList"></div>
    </div>

    <!-- Map Style -->
    <div>
      <div class="section-label">04 · Kartenansicht</div>
      <div class="config-row">
        <span class="config-label">Stil</span>
        <select id="mapStyle">
          <option value="osm">OpenStreetMap</option>
          <option value="satellite">Satellite</option>
          <option value="topo">Topografie</option>
          <option value="dark">Dunkel</option>
        </select>
      </div>
    </div>

    <!-- PDF Config -->
    <div>
      <div class="section-label">05 · PDF-Einstellungen</div>
      <div class="config-row">
        <span class="config-label">Seitenformat</span>
        <select id="pdfFormat">
          <option value="a4">A4</option>
          <option value="a3">A3</option>
          <option value="letter">Letter</option>
        </select>
      </div>
      <div class="config-row">
        <span class="config-label">Ausrichtung</span>
        <select id="pdfOrient">
          <option value="landscape">Querformat</option>
          <option value="portrait">Hochformat</option>
        </select>
      </div>
      <div class="config-row">
        <span class="config-label">Titel</span>
        <input type="text" id="pdfTitle" placeholder="Projekt-Titel" style="width:140px">
      </div>
      <div class="config-row">
        <span class="config-label">Beschreibung</span>
        <input type="text" id="pdfDesc" placeholder="optional" style="width:140px">
      </div>
    </div>

    <!-- Export Button -->
    <button class="btn btn-primary" id="exportBtn" disabled onclick="exportPDF()">
      ⬇ PDF EXPORTIEREN
    </button>
    <button class="btn btn-secondary" id="resetBtn" onclick="resetApp()" style="display:none">
      ↺ Zurücksetzen
    </button>

  </aside>

  <!-- hidden map container for off-screen PDF rendering only -->
  <div id="map" style="position:absolute;left:-9999px;width:800px;height:600px;visibility:hidden"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- PDF Preview Overlay -->
<div id="pdf-preview">
  <div class="preview-card" id="previewCard"></div>
  <div class="preview-actions">
    <button class="preview-btn confirm" onclick="downloadPDF()">⬇ Herunterladen</button>
    <button class="preview-btn cancel" onclick="closePreview()">Abbrechen</button>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────
let map, kmlData = null, allLayers = [];
let pointLayer, lineLayer, polyLayer;
let currentFilter = 'all';
let pdfDoc = null;
let stats = { features: 0, layers: 0, points: 0, polygons: 0, lines: 0 };
let featureGroups = {};

// ─── MAP TILES ───────────────────────────────────────────
const TILES = {
  osm:       'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  topo:      'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
  dark:      'https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png'
};

// ─── INIT MAP ─────────────────────────────────────────────
function initMap() {
  if (map) return;
  map = L.map('map').setView([51.1657, 10.4515], 6);
  L.tileLayer(TILES.osm, { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);

  pointLayer   = L.layerGroup().addTo(map);
  lineLayer    = L.layerGroup().addTo(map);
  polyLayer    = L.layerGroup().addTo(map);
}

document.getElementById('mapStyle').addEventListener('change', function() {
  if (!map) return;
  map.eachLayer(l => { if (l instanceof L.TileLayer) map.removeLayer(l); });
  L.tileLayer(TILES[this.value] || TILES.osm, { maxZoom: 19, attribution: '© ' + this.value }).addTo(map);
});

// ─── FILE HANDLING ────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

function processFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['kml','kmz'].includes(ext)) { showToast('Nur .kml oder .kmz Dateien erlaubt', 'error'); return; }

  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    parseKML(text, file.name);
  };
  reader.readAsText(file);
}

// ─── KML PARSER ───────────────────────────────────────────
function parseKML(kmlText, filename) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(kmlText, 'text/xml');

  if (doc.querySelector('parsererror')) {
    showToast('Ungültige KML-Datei', 'error'); return;
  }

  resetLayers();
  initMap();
  document.getElementById('layerSection').style.display = 'block';
  document.getElementById('exportBtn').disabled = false;
  document.getElementById('resetBtn').style.display = 'block';

  if (!document.getElementById('pdfTitle').value)
    document.getElementById('pdfTitle').value = filename.replace(/\.[^.]+$/, '');

  const folders = doc.querySelectorAll('Folder');
  const placemarks = doc.querySelectorAll('Placemark');

  stats = { features: placemarks.length, layers: Math.max(folders.length, 1), points: 0, polygons: 0, lines: 0 };

  // Process by Folder or all placemarks
  if (folders.length > 0) {
    folders.forEach((folder, i) => {
      const fname = folder.querySelector('name')?.textContent || `Ebene ${i+1}`;
      const fps = folder.querySelectorAll('Placemark');
      processPlacemarks(fps, fname, i);
    });
    // placemarks not in folders
    const rootPlacemarks = [...placemarks].filter(p => !p.closest('Folder'));
    if (rootPlacemarks.length) processPlacemarks(rootPlacemarks, 'Unbenannt', folders.length);
  } else {
    processPlacemarks(placemarks, filename.replace(/\.[^.]+$/, ''), 0);
  }

  updateStats();
  fitMapToBounds();
  updateFeatureList();
  showToast('✓ KML geladen — ' + stats.features + ' Features', 'success');
}

function processPlacemarks(placemarks, folderName, idx) {
  const colors = ['#3de68c','#5b8fff','#ff9f43','#ff6b6b','#a29bfe','#fd79a8','#00cec9'];
  const color = colors[idx % colors.length];

  placemarks.forEach(pm => {
    const name = pm.querySelector('name')?.textContent?.trim() || 'Feature';
    const rawDesc = pm.querySelector('description')?.textContent || '';
    // Strip HTML tags from description (KML often wraps it in a table)
    const desc = rawDesc.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
    const extData = parseExtendedData(pm);
    // Build props: Name first, then description (if any), then all extended data
    const props = {
      Name: name,
      ...(desc ? { Beschreibung: desc } : {}),
      Ebene: folderName,
      ...extData
    };

    // Point
    const point = pm.querySelector('Point coordinates');
    if (point) {
      const [lng, lat] = point.textContent.trim().split(',').map(Number);
      const pointIdx = allLayers.filter(l => l.type === 'point').length + 1;

      // DivIcon: numbered circle — reliable, no tooltip positioning bugs
      const icon = L.divIcon({
        className: '',
        html: `<div class="kml-pin">${pointIdx}</div>`,
        iconSize: [22, 22],
        iconAnchor: [11, 11]
      });
      const marker = L.marker([lat, lng], { icon });
      marker.bindTooltip(`<strong>${name}</strong>`, { sticky: true, direction: 'right', offset: [12, 0] });
      marker.on('click', () => showFeaturePanel(name, props));
      marker.addTo(pointLayer);
      allLayers.push({ marker, type: 'point', folder: folderName, name, props });
      stats.points++;
    }

    // LineString
    const line = pm.querySelector('LineString coordinates');
    if (line) {
      const coords = parseCoords(line.textContent);
      const poly = L.polyline(coords, { color: '#5b8fff', weight: 3, opacity: 0.85 });
      bindPopup(poly, name, props);
      poly.addTo(lineLayer);
      allLayers.push({ marker: poly, type: 'line', folder: folderName, name, props });
      stats.lines++;
    }

    // Polygon
    const polygon = pm.querySelector('Polygon outerBoundaryIs coordinates') ||
                    pm.querySelector('Polygon coordinates');
    if (polygon) {
      const coords = parseCoords(polygon.textContent);
      const shape = L.polygon(coords, {
        color: '#ff9f43', weight: 2, fillColor: color,
        fillOpacity: 0.25, opacity: 0.85
      });
      bindPopup(shape, name, props);
      shape.addTo(polyLayer);
      allLayers.push({ marker: shape, type: 'polygon', folder: folderName, name, props });
      stats.polygons++;
    }
  });
}

function parseCoords(raw) {
  return raw.trim().split(/\s+/).map(c => {
    const [lng, lat] = c.split(',').map(Number);
    return [lat, lng];
  }).filter(c => !isNaN(c[0]) && !isNaN(c[1]));
}

function parseExtendedData(pm) {
  const data = {};
  pm.querySelectorAll('SimpleData').forEach(sd => {
    data[sd.getAttribute('name')] = sd.textContent;
  });
  pm.querySelectorAll('Data').forEach(d => {
    const key = d.getAttribute('name');
    const val = d.querySelector('value')?.textContent;
    if (key && val) data[key] = val;
  });
  return data;
}

function bindPopup(layer, name, props) {
  layer.on('click', () => showFeaturePanel(name, props));
  // hover tooltip only for lines/polygons (points get permanent labels)
  if (!(layer instanceof L.CircleMarker)) {
    layer.bindTooltip(name, { sticky: true });
  }
}

// ─── FEATURE INFO PANEL ──────────────────────────────────
function showFeaturePanel(name, props) {
  document.getElementById('fipTitle').textContent = name;
  const container = document.getElementById('fipProps');
  container.innerHTML = Object.entries(props)
    .filter(([k,v]) => v && v.trim?.())
    .map(([k,v]) => `<div class="fip-prop"><span class="fip-key">${k}</span><span class="fip-val">${v}</span></div>`)
    .join('');
  document.getElementById('featureInfoPanel').classList.add('visible');
}
function closeFeaturePanel() {
  document.getElementById('featureInfoPanel').classList.remove('visible');
}

// ─── FILTER ───────────────────────────────────────────────
function filterLayer(type) {
  currentFilter = type;
  ['tbAll','tbPoints','tbLines','tbPolygons'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  document.getElementById(type === 'all' ? 'tbAll' : type === 'point' ? 'tbPoints' : type === 'line' ? 'tbLines' : 'tbPolygons')?.classList.add('active');

  if (type === 'all' || type === 'point') { if (!map.hasLayer(pointLayer)) map.addLayer(pointLayer); } else map.removeLayer(pointLayer);
  if (type === 'all' || type === 'line')  { if (!map.hasLayer(lineLayer)) map.addLayer(lineLayer); } else map.removeLayer(lineLayer);
  if (type === 'all' || type === 'polygon') { if (!map.hasLayer(polyLayer)) map.addLayer(polyLayer); } else map.removeLayer(polyLayer);
}

// ─── FEATURE LIST ─────────────────────────────────────────
function updateFeatureList() {
  const folders = [...new Set(allLayers.map(l => l.folder))];
  const list = document.getElementById('featureList');
  list.innerHTML = '';
  folders.forEach(f => {
    const count = allLayers.filter(l => l.folder === f).length;
    const el = document.createElement('div');
    el.className = 'feature-item active';
    el.innerHTML = `<div class="fi-left"><div class="feature-dot"></div><span>${f}</span></div><span style="color:var(--muted);font-size:11px">${count}</span>`;
    list.appendChild(el);
  });
}

// ─── STATS ────────────────────────────────────────────────
function updateStats() {
  document.getElementById('statFeatures').textContent = stats.features;
  document.getElementById('statLayers').textContent = stats.layers;
  document.getElementById('statPoints').textContent = stats.points;
  document.getElementById('statPolygons').textContent = stats.polygons;
}

function fitMapToBounds() {
  const bounds = [];
  allLayers.forEach(l => {
    try {
      const b = l.marker.getBounds?.() || null;
      if (b) bounds.push(...[b.getNorthEast(), b.getSouthWest()]);
      else if (l.marker.getLatLng) bounds.push(l.marker.getLatLng());
    } catch(e) {}
  });
  if (bounds.length) {
    map.fitBounds(L.latLngBounds(bounds), { padding: [40, 40] });
  }
}

// ─── RESET ────────────────────────────────────────────────
function resetLayers() {
  if (pointLayer) pointLayer.clearLayers();
  if (lineLayer)  lineLayer.clearLayers();
  if (polyLayer)  polyLayer.clearLayers();
  allLayers = [];
}

function resetApp() {
  resetLayers();
  document.getElementById('layerSection').style.display = 'none';
  document.getElementById('exportBtn').disabled = true;
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('featureList').innerHTML = '';
  document.getElementById('pdfTitle').value = '';
  document.getElementById('pdfDesc').value = '';
  ['statFeatures','statLayers','statPoints','statPolygons'].forEach(id => document.getElementById(id).textContent = '—');
  fileInput.value = '';
  stats = { features: 0, layers: 0, points: 0, polygons: 0, lines: 0 };
}

// ─── TILE WAIT HELPER ────────────────────────────────────
// ─── OFF-SCREEN MAP RENDERER ─────────────────────────────
// Renders tiles + all KML features onto a fresh canvas without
// touching the live DOM map — no CORS clipping, no missing markers.

const TILE_URL = 'https://tile.openstreetmap.org/{z}/{x}/{y}.png';
const EXPORT_W = 2480; // ~A4 landscape @300dpi
const EXPORT_H = 1754;

function latLngToTile(lat, lng, zoom) {
  const n = Math.pow(2, zoom);
  const x = Math.floor((lng + 180) / 360 * n);
  const latRad = lat * Math.PI / 180;
  const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);
  return { x, y };
}

function tileToLatLng(tx, ty, zoom) {
  const n = Math.pow(2, zoom);
  const lng = tx / n * 360 - 180;
  const latRad = Math.atan(Math.sinh(Math.PI * (1 - 2 * ty / n)));
  const lat = latRad * 180 / Math.PI;
  return { lat, lng };
}

function geoToPixel(lat, lng, topLeft, zoom, tileSize) {
  const n = Math.pow(2, zoom);
  const px = (lng + 180) / 360 * n * tileSize - topLeft.px;
  const latRad = lat * Math.PI / 180;
  const py = (1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n * tileSize - topLeft.py;
  return { x: px, y: py };
}

function getBoundsFromLayers() {
  let minLat = Infinity, maxLat = -Infinity, minLng = Infinity, maxLng = -Infinity;
  allLayers.forEach(l => {
    try {
      if (l.marker.getBounds) {
        const b = l.marker.getBounds();
        minLat = Math.min(minLat, b.getSouth()); maxLat = Math.max(maxLat, b.getNorth());
        minLng = Math.min(minLng, b.getWest());  maxLng = Math.max(maxLng, b.getEast());
      } else if (l.marker.getLatLng) {
        const p = l.marker.getLatLng();
        minLat = Math.min(minLat, p.lat); maxLat = Math.max(maxLat, p.lat);
        minLng = Math.min(minLng, p.lng); maxLng = Math.max(maxLng, p.lng);
      }
    } catch(e) {}
  });
  // add padding
  const dLat = (maxLat - minLat) * 0.12 || 0.05;
  const dLng = (maxLng - minLng) * 0.12 || 0.05;
  return { minLat: minLat - dLat, maxLat: maxLat + dLat, minLng: minLng - dLng, maxLng: maxLng + dLng };
}

function chooseBestZoom(bounds, tileSize) {
  for (let z = 18; z >= 1; z--) {
    const tl = latLngToTile(bounds.maxLat, bounds.minLng, z);
    const br = latLngToTile(bounds.minLat, bounds.maxLng, z);
    const tilesX = br.x - tl.x + 1;
    const tilesY = br.y - tl.y + 1;
    if (tilesX <= 12 && tilesY <= 10) return z;
  }
  return 4;
}

function loadTileImage(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => resolve(img);
    img.onerror = () => resolve(null); // skip failed tiles
    img.src = url;
  });
}

async function renderMapToCanvas() {
  const TILE = 256;
  const bounds = getBoundsFromLayers();
  const zoom   = chooseBestZoom(bounds, TILE);

  const tlTile = latLngToTile(bounds.maxLat, bounds.minLng, zoom);
  const brTile = latLngToTile(bounds.minLat, bounds.maxLng, zoom);

  const tilesX = brTile.x - tlTile.x + 1;
  const tilesY = brTile.y - tlTile.y + 1;

  // Top-left pixel origin in world-pixel coords
  const topLeft = {
    px: tlTile.x * TILE,
    py: tlTile.y * TILE
  };

  const cw = tilesX * TILE;
  const ch = tilesY * TILE;

  const canvas = document.createElement('canvas');
  canvas.width  = cw;
  canvas.height = ch;
  const ctx = canvas.getContext('2d');

  // 1. Draw tiles
  const tilePromises = [];
  for (let tx = tlTile.x; tx <= brTile.x; tx++) {
    for (let ty = tlTile.y; ty <= brTile.y; ty++) {
      const url = TILE_URL
        .replace('{z}', zoom)
        .replace('{x}', tx)
        .replace('{y}', ty);
      tilePromises.push(loadTileImage(url).then(img => ({ img, tx, ty })));
    }
  }

  showToast('Kartenkacheln werden geladen…', '');
  const tiles = await Promise.all(tilePromises);
  tiles.forEach(({ img, tx, ty }) => {
    if (!img) return;
    const dx = (tx - tlTile.x) * TILE;
    const dy = (ty - tlTile.y) * TILE;
    ctx.drawImage(img, dx, dy, TILE, TILE);
  });

  // helper: geo → canvas pixel
  const geo2px = (lat, lng) => geoToPixel(lat, lng, topLeft, zoom, TILE);

  // 2. Draw polygons (fill first, then stroke)
  allLayers.filter(l => l.type === 'polygon').forEach(l => {
    const latlngs = l.marker.getLatLngs()[0];
    if (!latlngs || latlngs.length < 2) return;
    ctx.beginPath();
    latlngs.forEach((p, i) => {
      const { x, y } = geo2px(p.lat, p.lng);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.fillStyle   = 'rgba(255,159,67,0.28)';
    ctx.strokeStyle = '#ff9f43';
    ctx.lineWidth   = Math.max(2, cw / 600);
    ctx.fill();
    ctx.stroke();
  });

  // 3. Draw lines
  allLayers.filter(l => l.type === 'line').forEach(l => {
    const latlngs = l.marker.getLatLngs();
    if (!latlngs || latlngs.length < 2) return;
    ctx.beginPath();
    latlngs.forEach((p, i) => {
      const { x, y } = geo2px(p.lat, p.lng);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = '#5b8fff';
    ctx.lineWidth   = Math.max(3, cw / 400);
    ctx.lineJoin    = 'round';
    ctx.stroke();
  });

  // 4. Draw points — number badge only (name in PDF legend, no overlapping labels)
  const r = Math.max(7, cw / 160);
  const pointLayers = allLayers.filter(l => l.type === 'point');
  pointLayers.forEach((l, idx) => {
    const p = l.marker.getLatLng();
    const { x, y } = geo2px(p.lat, p.lng);
    const num = String(idx + 1);

    // outer glow
    ctx.beginPath();
    ctx.arc(x, y, r + 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(41,98,255,0.18)';
    ctx.fill();
    // white ring
    ctx.beginPath();
    ctx.arc(x, y, r + 1.5, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    // filled circle
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle   = '#2962ff';
    ctx.fill();
    // number
    ctx.font = `bold ${Math.max(8, r * 1.0)}px sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(num, x, y);
  });

  // 5. Attribution
  ctx.font = `${Math.max(10, cw/120)}px sans-serif`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  const attrText = '© OpenStreetMap contributors';
  const atw = ctx.measureText(attrText).width;
  ctx.fillRect(cw - atw - 10, ch - 22, atw + 8, 20);
  ctx.fillStyle = '#fff';
  ctx.fillText(attrText, cw - atw - 6, ch - 7);

  return { canvas, pointLayers };
}

// ─── PDF EXPORT ───────────────────────────────────────────
async function exportPDF() {
  showToast('Karte wird vorbereitet…', '');
  document.getElementById('exportBtn').disabled = true;

  try {
    const { canvas: mapCanvas, pointLayers: pointData } = await renderMapToCanvas();

    const format = document.getElementById('pdfFormat').value;
    const orient = document.getElementById('pdfOrient').value;
    const title  = document.getElementById('pdfTitle').value || 'KML Export';
    const desc   = document.getElementById('pdfDesc').value;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: orient, unit: 'mm', format });

    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();
    const margin = 14;

    // ── Header: white background, black title ──
    doc.setFillColor(255, 255, 255);
    doc.rect(0, 0, pw, 20, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(15);
    doc.setTextColor(20, 20, 20);
    doc.text(title, margin, 13);

    if (desc) {
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(100, 100, 100);
      doc.text(desc, margin, 18);
    }

    const dateStr = new Date().toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' });
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(150, 150, 150);
    doc.text(dateStr, pw - margin, 13, { align: 'right' });

    // thin divider under header
    doc.setDrawColor(220, 220, 220);
    doc.line(margin, 21, pw - margin, 21);

    const y = 24; // map+legend start

    // ── Layout: left legend panel + map ──
    const hasPoints = pointData.length > 0;
    const legendW   = hasPoints ? 58 : 0;
    const gutter    = hasPoints ? 4  : 0;
    const availH    = ph - y - margin - 10;
    const mapAreaW  = pw - margin * 2 - legendW - gutter;

    // ── Left legend panel ──
    if (hasPoints) {
      // background
      doc.setFillColor(248, 249, 251);
      doc.setDrawColor(220, 224, 232);
      doc.roundedRect(margin, y, legendW, availH, 3, 3, 'FD');

      // panel heading
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(7.5);
      doc.setTextColor(80, 90, 110);
      doc.text('PUNKTLISTE', margin + 4, y + 6.5);
      doc.setDrawColor(210, 215, 225);
      doc.line(margin + 3, y + 8.5, margin + legendW - 3, y + 8.5);

      // calculate row height based on props per point
      // each point: name line + all non-empty props as sub-lines
      const maxLabelW = legendW - 15;
      let ey = y + 12;
      const nameSize   = 7.5;
      const propSize   = 6.0;
      const nameLineH  = 4.2;  // mm per name line
      const propLineH  = 3.6;  // mm per prop line
      const entryPad   = 3.5;  // mm padding below each entry
      let overflowFrom = -1;

      pointData.forEach((l, idx) => {
        const num = String(idx + 1);
        const lbl = l.name || `Punkt ${num}`;

        // ALL props except 'Ebene' — Beschreibung included
        const extraProps = Object.entries(l.props || {})
          .filter(([k, v]) => k !== 'Name' && k !== 'Ebene' && v && String(v).trim() !== '');

        // Measure name lines — must set font first for correct metrics
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(nameSize);
        const nameLines = doc.splitTextToSize(lbl, maxLabelW);

        // Measure all prop lines — font must match render font
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(propSize);
        const propLines = extraProps.flatMap(([k, v]) =>
          doc.splitTextToSize(`${k}: ${String(v).trim()}`, maxLabelW)
        );

        const rowH = nameLines.length * nameLineH + propLines.length * propLineH + entryPad;

        // Check if this entry fits
        if (ey + rowH > y + availH - 8) {
          if (overflowFrom < 0) overflowFrom = idx;
          return;
        }

        // ── Draw number badge ──
        // firstLineY = center of first name line
        const firstLineY = ey + nameLineH;
        doc.setFillColor(41, 98, 255);
        doc.circle(margin + 6, firstLineY, 3.0, 'F');
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(5.5);
        doc.setTextColor(255, 255, 255);
        doc.text(num, margin + 6, firstLineY, { align: 'center', baseline: 'middle' });

        // ── Draw name lines ──
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(nameSize);
        doc.setTextColor(25, 30, 50);
        let curY = ey;
        nameLines.forEach(nl => {
          curY += nameLineH;
          doc.text(nl, margin + 11, curY, { baseline: 'middle' });
        });

        // ── Draw ALL prop lines ──
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(propSize);
        doc.setTextColor(75, 90, 115);
        propLines.forEach(pl => {
          curY += propLineH;
          doc.text(pl, margin + 11, curY, { baseline: 'middle' });
        });

        // ── Separator ──
        if (idx < pointData.length - 1) {
          doc.setDrawColor(218, 222, 235);
          doc.line(margin + 4, ey + rowH, margin + legendW - 4, ey + rowH);
        }

        ey += rowH;
      });

      // Overflow hint
      if (overflowFrom >= 0) {
        doc.setFont('helvetica', 'italic');
        doc.setFontSize(6);
        doc.setTextColor(120, 130, 150);
        doc.text(`+ ${pointData.length - overflowFrom} weitere → Seite 2`,
          margin + 4, y + availH - 3);
      }
    }

    // ── Map image ──
    const imgData = mapCanvas.toDataURL('image/jpeg', 0.94);
    const aspect  = mapCanvas.width / mapCanvas.height;
    let imgW = mapAreaW, imgH = mapAreaW / aspect;
    if (imgH > availH) { imgH = availH; imgW = availH * aspect; }
    const imgX = margin + legendW + gutter;
    doc.addImage(imgData, 'JPEG', imgX, y, imgW, imgH);

    // ── Footer ──
    doc.setDrawColor(220, 220, 220);
    doc.line(margin, ph - 10, pw - margin, ph - 10);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(160, 160, 160);
    doc.text('KML→PDF Konverter · Geo-Visualisierung', margin, ph - 5);
    doc.text('Seite 1', pw - margin, ph - 5, { align: 'right' });

    // ── Page 2: complete point list with all attributes ──
    if (pointData.length > 0) {
      doc.addPage();

      // white header
      doc.setFillColor(255, 255, 255);
      doc.rect(0, 0, pw, 20, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(13);
      doc.setTextColor(20, 20, 20);
      doc.text('Punktliste — vollständige Attribute', margin, 13);
      doc.setDrawColor(220, 220, 220);
      doc.line(margin, 21, pw - margin, 21);

      let ty = 27;
      const colCount = 3;
      const colW2 = (pw - margin * 2) / colCount;

      // table header
      doc.setFillColor(240, 242, 248);
      doc.rect(margin, ty, pw - margin * 2, 8, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8);
      doc.setTextColor(60, 70, 90);
      doc.text('#',        margin + 4,          ty + 5.5);
      doc.text('Name',     margin + 12,          ty + 5.5);
      doc.text('Attribut', margin + colW2 + 4,  ty + 5.5);
      doc.text('Wert',     margin + colW2 * 2,  ty + 5.5);
      ty += 10;

      pointData.forEach((l, idx) => {
        const num  = String(idx + 1);
        const lbl  = l.name || `Punkt ${num}`;
        const rows = Object.entries(l.props || {})
          .filter(([k, v]) => k !== 'Name' && k !== 'Ebene' && v && String(v).trim());

        const blockH = Math.max(8, rows.length * 5.5 + 4);

        if (ty + blockH > ph - 16) {
          // footer before new page
          doc.setDrawColor(220, 220, 220);
          doc.line(margin, ph - 10, pw - margin, ph - 10);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(7);
          doc.setTextColor(160, 160, 160);
          doc.text('KML→PDF Konverter · Geo-Visualisierung', margin, ph - 5);
          doc.addPage();
          ty = margin;

          // repeat col header
          doc.setFillColor(240, 242, 248);
          doc.rect(margin, ty, pw - margin * 2, 8, 'F');
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(8);
          doc.setTextColor(60, 70, 90);
          doc.text('#',        margin + 4,          ty + 5.5);
          doc.text('Name',     margin + 12,          ty + 5.5);
          doc.text('Attribut', margin + colW2 + 4,  ty + 5.5);
          doc.text('Wert',     margin + colW2 * 2,  ty + 5.5);
          ty += 10;
        }

        // alternating row bg
        if (idx % 2 === 0) {
          doc.setFillColor(252, 253, 255);
          doc.rect(margin, ty, pw - margin * 2, blockH, 'F');
        }

        // number badge
        doc.setFillColor(41, 98, 255);
        doc.circle(margin + 6, ty + blockH / 2, 3.5, 'F');
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(6.5);
        doc.setTextColor(255, 255, 255);
        doc.text(num, margin + 6, ty + blockH / 2, { align: 'center', baseline: 'middle' });

        // name
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(8);
        doc.setTextColor(20, 25, 40);
        doc.text(doc.splitTextToSize(lbl, colW2 - 16)[0], margin + 12, ty + 5.5);

        // attribute rows
        rows.forEach(([k, v], ri) => {
          const ry = ty + 4 + ri * 5.5;
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(7.5);
          doc.setTextColor(70, 80, 100);
          doc.text(String(k), margin + colW2 + 4, ry + 2);
          doc.setTextColor(20, 25, 40);
          doc.text(doc.splitTextToSize(String(v), colW2 - 8)[0], margin + colW2 * 2, ry + 2);
        });

        // row separator
        doc.setDrawColor(225, 228, 238);
        doc.line(margin, ty + blockH, pw - margin, ty + blockH);
        ty += blockH;
      });

      // footer p2+
      doc.setDrawColor(220, 220, 220);
      doc.line(margin, ph - 10, pw - margin, ph - 10);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7);
      doc.setTextColor(160, 160, 160);
      doc.text('KML→PDF Konverter · Geo-Visualisierung', margin, ph - 5);
      doc.text(`Seite ${doc.internal.getCurrentPageInfo().pageNumber}`, pw - margin, ph - 5, { align: 'right' });
    }

    pdfDoc = doc;
    const previewUrl = doc.output('bloburl');
    document.getElementById('previewCard').innerHTML =
      `<iframe src="${previewUrl}" style="width:100%;height:80vh;border:none;"></iframe>`;
    document.getElementById('pdf-preview').classList.add('show');
    showToast('✓ Vorschau bereit', 'success');

  } catch(err) {
    console.error(err);
    showToast('Fehler: ' + err.message, 'error');
  } finally {
    document.getElementById('exportBtn').disabled = false;
  }
}

function downloadPDF() {
  if (!pdfDoc) return;
  const title = document.getElementById('pdfTitle').value || 'kml-export';
  pdfDoc.save(title.replace(/\s+/g, '_') + '.pdf');
  closePreview();
  showToast('✓ PDF gespeichert', 'success');
}

function closePreview() {
  document.getElementById('pdf-preview').classList.remove('show');
  document.getElementById('previewCard').innerHTML = '';
}

// ─── TOAST ────────────────────────────────────────────────
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
